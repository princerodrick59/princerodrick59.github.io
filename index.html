<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team 1792 · ATLAS Pit Display</title>
<link rel="icon" type="image/png" href="assets/images/logo/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="app">

<!-- HEADER -->
<div id="hdr">
  <div class="logo-wrap">
    <img src="assets/images/logo/logo.svg" alt="RTR Logo">
    <div class="hdr-title">
      <div class="hdr-main">1792 ATLAS &nbsp;·&nbsp; REBUILT 2026</div>
      <div class="hdr-sub">Round Table Robotics &nbsp;·&nbsp; Oak Creek, WI</div>
    </div>
  </div>
  <div class="hdr-right">
    <img src="assets/images/logo/gamelogo.png" alt="Reefscape 2025" class="game-logo">
  </div>
</div>

<div id="body">
<!-- SIDEBAR -->
<div id="sb">
  <div class="ns">Overview</div>
  <button class="nb active" onclick="show('home',this)"><span class="ni">⬡</span> Robot Overview</button>
  <div class="ns" style="margin-top:6px;">Strategy</div>
  <button class="nb" onclick="show('strat',this)"><span class="ni">◎</span> Strategy &amp; Goals</button>
  <div class="ns" style="margin-top:6px;">Subsystems</div>
  <button class="nb" onclick="show('drive',this)"><span class="ni">◈</span> Drivetrain / Frame</button>
  <button class="nb" onclick="show('elev',this)"><span class="ni">⬆</span> Elevator</button>
  <button class="nb" onclick="show('ee',this)"><span class="ni">◉</span> End Effector</button>
  <button class="nb" onclick="show('climb',this)"><span class="ni">▲</span> Climber</button>
  <div class="ns" style="margin-top:6px;">Software</div>
  <button class="nb" onclick="show('prog',this)"><span class="ni">&lt;/&gt;</span> Programming</button>
  <div class="ns" style="margin-top:6px;">Team</div>
  <button class="nb" onclick="show('impact',this)"><span class="ni">◐</span> Impact / Community</button>
  <div class="sb-foot"><div class="sb-foot-txt">Gearing Up for Tomorrow</div></div>
</div>

<!-- MAIN -->
<div id="main"></div>

</div><!-- /body -->
</div><!-- /app -->

<!-- LIGHTBOX -->
<div id="lbox" onclick="closeLbox()">
  <div id="lbox-close" onclick="closeLbox()">✕</div>
  <img id="lbox-img" src="" alt="">
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
<script src="js/main.js"></script>
<script>
function openLbox(src, alt) {
  document.getElementById('lbox-img').src = src;
  document.getElementById('lbox-img').alt = alt || '';
  document.getElementById('lbox').classList.add('open');
}
function closeLbox() {
  document.getElementById('lbox').classList.remove('open');
}
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeLbox(); });
document.addEventListener('click', function(e) {
  const img = e.target.closest('#main img.til, #main img.sub-hero-img, #main img.card-img, img.rphoto');
  if (img) openLbox(img.src, img.alt);
});
</script>
</body>
